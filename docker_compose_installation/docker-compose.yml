# MLflow production-style stack:
#   postgres  -> backend store (experiments, runs, params, metrics, model registry)
#   minio     -> S3-compatible artifact store (models, plots, files)
#   mlflow    -> tracking server with proxied artifact serving + basic auth
#
# Remote developers only ever talk to the mlflow service (port 5000).
# They do NOT need NFS mounts or S3 credentials -- the server proxies artifacts.
#
# All secrets come from .env (see .env.example). Never commit .env.

services:
  postgres:
    image: postgres:14
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Not published to the host by default -- only the mlflow service needs it,
    # and it reaches postgres over the internal compose network.
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      # API (S3) and web console. Restrict/remove these in production if the
      # object store should not be reachable from outside the host.
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot job: create the artifacts bucket, then exit.
  minio-setup:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MLFLOW_BUCKET_NAME: ${MLFLOW_BUCKET_NAME}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MLFLOW_BUCKET_NAME} &&
      echo 'Bucket $${MLFLOW_BUCKET_NAME} ready';
      "

  mlflow:
    image: ${MLFLOW_IMAGE:-mlflow-with-psycopg2:v2.20.3}
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    # Not published to the host -- reached only via the caddy reverse proxy on
    # port 80. (Add a "ports: [5000:5000]" back if you want direct access too.)
    expose:
      - "5000"
    environment:
      # Backend store (Postgres)
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Artifact store (MinIO / S3). Only the SERVER holds these credentials.
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_BUCKET_NAME: ${MLFLOW_BUCKET_NAME}
      # Bootstrap admin for basic-auth (only used on first startup)
      MLFLOW_ADMIN_USERNAME: ${MLFLOW_ADMIN_USERNAME}
      MLFLOW_ADMIN_PASSWORD: ${MLFLOW_ADMIN_PASSWORD}
      # Stable secret key for basic-auth CSRF protection. Must stay constant
      # across restarts (and identical across replicas if you scale out).
      MLFLOW_FLASK_SERVER_SECRET_KEY: ${MLFLOW_FLASK_SERVER_SECRET_KEY}
    volumes:
      # Holds the basic-auth user database (sqlite) so accounts survive restarts.
      - mlflow_auth:/mlflow/auth
    # Generate the basic-auth config from env at startup (keeps secrets out of
    # the image and out of git), then launch the server with proxied artifacts.
    command:
      - /bin/bash
      - -c
      - |
        set -e
        mkdir -p /mlflow/auth
        cat > /mlflow/auth/basic_auth.ini <<EOF
        [mlflow]
        default_permission = READ
        database_uri = sqlite:////mlflow/auth/basic_auth.db
        admin_username = $${MLFLOW_ADMIN_USERNAME}
        admin_password = $${MLFLOW_ADMIN_PASSWORD}
        authorization_function = mlflow.server.auth:authenticate_request_basic_auth
        EOF
        export MLFLOW_AUTH_CONFIG_PATH=/mlflow/auth/basic_auth.ini
        exec mlflow server \
          --host 0.0.0.0 \
          --port 5000 \
          --backend-store-uri "postgresql://$${POSTGRES_USER}:$${POSTGRES_PASSWORD}@postgres:5432/$${POSTGRES_DB}" \
          --artifacts-destination "s3://$${MLFLOW_BUCKET_NAME}" \
          --serve-artifacts \
          --app-name basic-auth
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # Reverse proxy so developers reach MLflow on port 80 (no :5000 in the URL).
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  minio_data:
  mlflow_auth:
  caddy_data:
  caddy_config:
